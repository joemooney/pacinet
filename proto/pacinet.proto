syntax = "proto3";
package pacinet;

import "google/protobuf/timestamp.proto";

// ============================================================================
// PaciNetController — southbound: agent → controller
// ============================================================================

service PaciNetController {
  // Agent registers itself with the controller on startup
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);

  // Periodic health check from agent
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Agent pushes counter data to controller
  rpc ReportCounters(ReportCountersRequest) returns (ReportCountersResponse);
}

// ============================================================================
// PaciNetAgent — southbound: controller → agent
// ============================================================================

service PaciNetAgent {
  // Push YAML rules + compile options to agent
  rpc DeployRules(DeployRulesRequest) returns (DeployRulesResponse);

  // Request counter snapshot from agent
  rpc GetCounters(GetCountersRequest) returns (GetCountersResponse);

  // Request node status from agent
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

// ============================================================================
// PaciNetManagement — northbound: CLI → controller
// ============================================================================

service PaciNetManagement {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse);

  rpc DeployPolicy(DeployPolicyRequest) returns (DeployPolicyResponse);
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);

  rpc GetNodeCounters(GetNodeCountersRequest) returns (GetNodeCountersResponse);
  rpc GetAggregateCounters(GetAggregateCountersRequest) returns (GetAggregateCountersResponse);

  // Phase 3: Fleet management
  rpc BatchDeployPolicy(BatchDeployPolicyRequest) returns (BatchDeployPolicyResponse);
  rpc GetFleetStatus(GetFleetStatusRequest) returns (GetFleetStatusResponse);

  // Phase 4: History, audit, rollback
  rpc GetPolicyHistory(GetPolicyHistoryRequest) returns (GetPolicyHistoryResponse);
  rpc GetDeploymentHistory(GetDeploymentHistoryRequest) returns (GetDeploymentHistoryResponse);
  rpc RollbackPolicy(RollbackPolicyRequest) returns (RollbackPolicyResponse);

  // Phase 5: FSM management
  rpc CreateFsmDefinition(CreateFsmDefinitionRequest) returns (CreateFsmDefinitionResponse);
  rpc GetFsmDefinition(GetFsmDefinitionRequest) returns (GetFsmDefinitionResponse);
  rpc ListFsmDefinitions(ListFsmDefinitionsRequest) returns (ListFsmDefinitionsResponse);
  rpc DeleteFsmDefinition(DeleteFsmDefinitionRequest) returns (DeleteFsmDefinitionResponse);
  rpc StartFsm(StartFsmRequest) returns (StartFsmResponse);
  rpc GetFsmInstance(GetFsmInstanceRequest) returns (GetFsmInstanceResponse);
  rpc ListFsmInstances(ListFsmInstancesRequest) returns (ListFsmInstancesResponse);
  rpc AdvanceFsm(AdvanceFsmRequest) returns (AdvanceFsmResponse);
  rpc CancelFsm(CancelFsmRequest) returns (CancelFsmResponse);

  // Phase 6: Server-side streaming for live event watching
  rpc WatchFsmEvents(WatchFsmEventsRequest) returns (stream FsmEvent);
  rpc WatchCounters(WatchCountersRequest) returns (stream CounterUpdate);
  rpc WatchNodeEvents(WatchNodeEventsRequest) returns (stream NodeEvent);
}

// ============================================================================
// Common types
// ============================================================================

enum NodeState {
  NODE_STATE_UNSPECIFIED = 0;
  NODE_STATE_REGISTERED = 1;
  NODE_STATE_ONLINE = 2;
  NODE_STATE_DEPLOYING = 3;
  NODE_STATE_ACTIVE = 4;
  NODE_STATE_ERROR = 5;
  NODE_STATE_OFFLINE = 6;
}

message NodeInfo {
  string node_id = 1;
  string hostname = 2;
  string agent_address = 3;         // e.g. "192.168.1.10:50055"
  map<string, string> labels = 4;
  NodeState state = 5;
  google.protobuf.Timestamp registered_at = 6;
  google.protobuf.Timestamp last_heartbeat = 7;
  string pacgate_version = 8;
  // Phase 3: enriched fields
  string policy_hash = 9;
  uint64 uptime_seconds = 10;
  double last_heartbeat_age_seconds = 11;
}

message RuleCounter {
  string rule_name = 1;
  uint64 match_count = 2;
  uint64 byte_count = 3;
}

message CompileOptions {
  bool counters = 1;
  bool rate_limit = 2;
  bool conntrack = 3;
}

// ============================================================================
// PaciNetController messages
// ============================================================================

message RegisterNodeRequest {
  string hostname = 1;
  string agent_address = 2;
  map<string, string> labels = 3;
  string pacgate_version = 4;
}

message RegisterNodeResponse {
  string node_id = 1;
  bool accepted = 2;
  string message = 3;
}

message HeartbeatRequest {
  string node_id = 1;
  NodeState state = 2;
  double cpu_usage = 3;
  uint64 uptime_seconds = 4;
}

message HeartbeatResponse {
  bool acknowledged = 1;
}

message ReportCountersRequest {
  string node_id = 1;
  repeated RuleCounter counters = 2;
  google.protobuf.Timestamp collected_at = 3;
}

message ReportCountersResponse {
  bool acknowledged = 1;
}

// ============================================================================
// PaciNetAgent messages
// ============================================================================

message DeployRulesRequest {
  string rules_yaml = 1;
  CompileOptions options = 2;
}

message DeployRulesResponse {
  bool success = 1;
  string message = 2;
  repeated string warnings = 3;
}

message GetCountersRequest {}

message GetCountersResponse {
  repeated RuleCounter counters = 1;
  google.protobuf.Timestamp collected_at = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  NodeState state = 1;
  string pacgate_version = 2;
  string active_policy_hash = 3;
  uint64 uptime_seconds = 4;
}

// ============================================================================
// PaciNetManagement messages
// ============================================================================

message ListNodesRequest {
  map<string, string> label_filter = 1;
}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  NodeInfo node = 1;
}

message RemoveNodeRequest {
  string node_id = 1;
}

message RemoveNodeResponse {
  bool success = 1;
  string message = 2;
}

message DeployPolicyRequest {
  string node_id = 1;
  string rules_yaml = 2;
  CompileOptions options = 3;
}

message DeployPolicyResponse {
  bool success = 1;
  string message = 2;
  repeated string warnings = 3;
}

message GetPolicyRequest {
  string node_id = 1;
}

message GetPolicyResponse {
  string node_id = 1;
  string rules_yaml = 2;
  string policy_hash = 3;
  google.protobuf.Timestamp deployed_at = 4;
}

message GetNodeCountersRequest {
  string node_id = 1;
}

message GetNodeCountersResponse {
  string node_id = 1;
  repeated RuleCounter counters = 2;
  google.protobuf.Timestamp collected_at = 3;
}

message GetAggregateCountersRequest {
  map<string, string> label_filter = 1;
}

message GetAggregateCountersResponse {
  repeated NodeCounterSet node_counters = 1;
}

message NodeCounterSet {
  string node_id = 1;
  repeated RuleCounter counters = 2;
  google.protobuf.Timestamp collected_at = 3;
}

// ============================================================================
// Phase 3: Batch deploy messages
// ============================================================================

message BatchDeployPolicyRequest {
  map<string, string> label_filter = 1;
  string rules_yaml = 2;
  CompileOptions options = 3;
}

message BatchDeployPolicyResponse {
  uint32 total_nodes = 1;
  uint32 succeeded = 2;
  uint32 failed = 3;
  repeated NodeDeployResult results = 4;
}

message NodeDeployResult {
  string node_id = 1;
  string hostname = 2;
  bool success = 3;
  string message = 4;
  repeated string warnings = 5;
}

// ============================================================================
// Phase 3: Fleet status messages
// ============================================================================

message GetFleetStatusRequest {
  map<string, string> label_filter = 1;
}

message GetFleetStatusResponse {
  uint32 total_nodes = 1;
  map<string, uint32> nodes_by_state = 2;
  repeated FleetNodeSummary nodes = 3;
}

message FleetNodeSummary {
  string node_id = 1;
  string hostname = 2;
  NodeState state = 3;
  string policy_hash = 4;
  uint64 uptime_seconds = 5;
  double last_heartbeat_age_seconds = 6;
  google.protobuf.Timestamp last_deploy_time = 7;
}

// ============================================================================
// Phase 4: Policy history, deployment audit, rollback messages
// ============================================================================

message GetPolicyHistoryRequest {
  string node_id = 1;
  uint32 limit = 2;  // 0 = default (10)
}

message GetPolicyHistoryResponse {
  repeated PolicyVersionInfo versions = 1;
}

message PolicyVersionInfo {
  uint64 version = 1;
  string node_id = 2;
  string policy_hash = 3;
  google.protobuf.Timestamp deployed_at = 4;
  string rules_yaml = 5;
}

message GetDeploymentHistoryRequest {
  string node_id = 1;
  uint32 limit = 2;  // 0 = default (20)
}

message GetDeploymentHistoryResponse {
  repeated DeploymentInfo deployments = 1;
}

message DeploymentInfo {
  string id = 1;
  string node_id = 2;
  uint64 policy_version = 3;
  string policy_hash = 4;
  google.protobuf.Timestamp deployed_at = 5;
  string result = 6;
  string message = 7;
}

message RollbackPolicyRequest {
  string node_id = 1;
  uint64 target_version = 2;  // 0 = previous version
}

message RollbackPolicyResponse {
  bool success = 1;
  string message = 2;
  uint64 rolled_back_to_version = 3;
}

// ============================================================================
// Phase 5: FSM messages
// ============================================================================

message CreateFsmDefinitionRequest {
  string definition_yaml = 1;
}

message CreateFsmDefinitionResponse {
  bool success = 1;
  string name = 2;
  string message = 3;
}

message GetFsmDefinitionRequest {
  string name = 1;
}

message GetFsmDefinitionResponse {
  string name = 1;
  string kind = 2;
  string description = 3;
  string definition_yaml = 4;
}

message ListFsmDefinitionsRequest {
  string kind = 1;  // optional filter: "deployment" or "adaptive_policy"
}

message ListFsmDefinitionsResponse {
  repeated FsmDefinitionSummary definitions = 1;
}

message FsmDefinitionSummary {
  string name = 1;
  string kind = 2;
  string description = 3;
  uint32 state_count = 4;
  string initial_state = 5;
}

message DeleteFsmDefinitionRequest {
  string name = 1;
}

message DeleteFsmDefinitionResponse {
  bool success = 1;
  string message = 2;
}

message StartFsmRequest {
  string definition_name = 1;
  string rules_yaml = 2;
  CompileOptions options = 3;
  map<string, string> target_label_filter = 4;  // For adaptive policy node selection
}

message StartFsmResponse {
  bool success = 1;
  string instance_id = 2;
  string message = 3;
}

message GetFsmInstanceRequest {
  string instance_id = 1;
}

message GetFsmInstanceResponse {
  FsmInstanceInfo instance = 1;
}

message FsmInstanceInfo {
  string instance_id = 1;
  string definition_name = 2;
  string current_state = 3;
  string status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  repeated FsmTransitionInfo history = 7;
  uint32 deployed_nodes = 8;
  uint32 failed_nodes = 9;
  uint32 target_nodes = 10;
}

message FsmTransitionInfo {
  string from_state = 1;
  string to_state = 2;
  string trigger = 3;
  google.protobuf.Timestamp timestamp = 4;
  string message = 5;
}

message ListFsmInstancesRequest {
  string definition_name = 1;  // optional filter
  string status = 2;           // optional filter: "running", "completed", etc.
}

message ListFsmInstancesResponse {
  repeated FsmInstanceInfo instances = 1;
}

message AdvanceFsmRequest {
  string instance_id = 1;
  string target_state = 2;  // optional: if empty, advances to next valid state
}

message AdvanceFsmResponse {
  bool success = 1;
  string current_state = 2;
  string message = 3;
}

message CancelFsmRequest {
  string instance_id = 1;
  string reason = 2;
}

message CancelFsmResponse {
  bool success = 1;
  string message = 2;
}

// ============================================================================
// Phase 6: Streaming event messages
// ============================================================================

// --- FSM event streaming ---

message WatchFsmEventsRequest {
  string instance_id = 1;  // optional: filter by instance
}

enum FsmEventType {
  FSM_EVENT_UNSPECIFIED = 0;
  FSM_EVENT_TRANSITION = 1;
  FSM_EVENT_DEPLOY_PROGRESS = 2;
  FSM_EVENT_INSTANCE_COMPLETED = 3;
}

message FsmEvent {
  FsmEventType event_type = 1;
  string instance_id = 2;
  string definition_name = 3;
  // For TRANSITION
  string from_state = 4;
  string to_state = 5;
  string trigger = 6;
  string message = 7;
  // For DEPLOY_PROGRESS
  uint32 deployed_nodes = 8;
  uint32 failed_nodes = 9;
  uint32 target_nodes = 10;
  // For INSTANCE_COMPLETED
  string final_status = 11;
  google.protobuf.Timestamp timestamp = 12;
}

// --- Counter update streaming ---

message WatchCountersRequest {
  string node_id = 1;  // optional: filter by node
}

message CounterUpdate {
  string node_id = 1;
  repeated CounterRateInfo counters = 2;
  google.protobuf.Timestamp collected_at = 3;
}

message CounterRateInfo {
  string rule_name = 1;
  uint64 match_count = 2;
  uint64 byte_count = 3;
  double matches_per_second = 4;
  double bytes_per_second = 5;
}

// --- Node event streaming ---

message WatchNodeEventsRequest {
  map<string, string> label_filter = 1;  // optional: filter by labels
}

enum NodeEventType {
  NODE_EVENT_UNSPECIFIED = 0;
  NODE_EVENT_REGISTERED = 1;
  NODE_EVENT_STATE_CHANGED = 2;
  NODE_EVENT_HEARTBEAT_STALE = 3;
  NODE_EVENT_REMOVED = 4;
}

message NodeEvent {
  NodeEventType event_type = 1;
  string node_id = 2;
  string hostname = 3;
  map<string, string> labels = 4;
  NodeState old_state = 5;
  NodeState new_state = 6;
  google.protobuf.Timestamp timestamp = 7;
}
